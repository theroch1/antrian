<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Operator Antrean - Apps Script</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #f2f2f7;
      color: #1c1c1e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .ipad-container {
      background: #ffffff;
      width: 100%;
      max-width: 720px;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
    }

    .display-card {
      background-color: #f2f2f7;
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      margin-bottom: 25px;
      border: 1px solid #e5e5ea;
    }

    .display-label {
      font-size: 13px;
      font-weight: 600;
      color: #8e8e93;
      text-transform: uppercase;
    }

    .queue-number {
      font-size: 84px;
      font-weight: 800;
      color: #007aff;
      line-height: 1;
      margin: 8px 0;
    }

    .loket-status {
      font-size: 18px;
      font-weight: 600;
      color: #3a3a3c;
    }

    .loket-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 25px;
    }

    .loket-grid .btn-loket:nth-child(4) {
      grid-column: 1 / 2;
    }

    .btn-loket {
      background-color: #34c759;
      color: #ffffff;
      border: none;
      border-radius: 16px;
      height: 90px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 12px rgba(52, 199, 89, 0.25);
      transition: transform 0.1s;
    }

    .btn-loket:disabled {
      background-color: #aeaeb2;
      box-shadow: none;
      cursor: not-allowed;
    }

    .btn-loket:active:not(:disabled) {
      transform: scale(0.96);
    }

    .btn-loket span {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.9;
      margin-top: 4px;
    }

    .control-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
    }

    .btn-control {
      height: 56px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-recall {
      background-color: #007aff;
      color: #ffffff;
    }

    .btn-reset {
      background-color: #ff3b30;
      color: #ffffff;
    }
  </style>
</head>
<body>

  <div class="ipad-container">
    <div class="header">
      <h1>Panel Operator Panggil</h1>
      <p id="loadingStatus">Menghubungkan ke Google Sheets...</p>
    </div>

    <div class="display-card">
      <div class="display-label">Panggilan Terakhir</div>
      <div class="queue-number" id="numDisplay">0</div>
      <div class="loket-status" id="loketDisplay">Belum Ada Panggilan</div>
    </div>

    <div class="loket-grid">
      <button class="btn-loket" onclick="panggil(1)">LOKET 1<span class="next-label">...</span></button>
      <button class="btn-loket" onclick="panggil(2)">LOKET 2<span class="next-label">...</span></button>
      <button class="btn-loket" onclick="panggil(3)">LOKET 3<span class="next-label">...</span></button>
      <button class="btn-loket" onclick="panggil(4)">LOKET 4<span class="next-label">...</span></button>
      <button class="btn-loket" onclick="panggil(5)">LOKET 5<span class="next-label">...</span></button>
    </div>

    <div class="control-grid">
      <button class="btn-control btn-recall" onclick="panggilUlang()">Panggil Ulang</button>
      <button class="btn-control btn-reset" onclick="resetAntrean()">Reset Harian</button>
    </div>
  </div>

  <script>
    // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2Z72119TldddiORT6m8dsOEkDZlRTuaII_fjYCNnFbBEkGGnpwUsRp1T0JvdztUpH/exec"; 

    let currentNumber = 0;
    let currentLoket = 0;

    // Ambil data awal dari Sheets saat aplikasi dibuka
    loadData();

    async function loadData() {
      try {
        const response = await fetch(`${SCRIPT_URL}?action=get`);
        const data = await response.json();
        currentNumber = data.nomor;
        currentLoket = data.loket;
        updateUI();
        document.getElementById('loadingStatus').innerText = "Terhubung ke Database";
      } catch (err) {
        document.getElementById('loadingStatus').innerText = "Gagal terhubung ke Database";
      }
    }

    function updateUI() {
      document.getElementById('numDisplay').innerText = currentNumber;
      if (currentNumber > 0 && currentLoket > 0) {
        document.getElementById('loketDisplay').innerText = `Menuju Loket ${currentLoket}`;
      } else {
        document.getElementById('loketDisplay').innerText = 'Belum Ada Panggilan';
      }

      const nextNum = currentNumber < 600 ? currentNumber + 1 : 600;
      document.querySelectorAll('.next-label').forEach(el => {
        el.innerText = currentNumber < 600 ? `Panggil No. ${nextNum}` : `Batas Max (600)`;
      });
    }

    async function panggil(loket) {
      if (currentNumber >= 600) {
        alert("Sudah mencapai batas maksimum 600!");
        return;
      }

      // Optimistic UI update (biar respon tombol cepat)
      currentNumber += 1;
      currentLoket = loket;
      updateUI();
      bersuara(currentNumber, currentLoket);

      // Kirim pembaruan ke Google Sheets di background
      try {
        await fetch(`${SCRIPT_URL}?action=next&loket=${loket}`);
      } catch (e) {
        console.error("Gagal sinkronkan ke Google Sheets", e);
      }
    }

    async function resetAntrean() {
      if (confirm("Reset antrean harian kembali ke 0?")) {
        currentNumber = 0;
        currentLoket = 0;
        updateUI();
        try {
          await fetch(`${SCRIPT_URL}?action=reset`);
        } catch (e) {
          console.error("Gagal reset ke Google Sheets", e);
        }
      }
    }

    function panggilUlang() {
      if (currentNumber > 0) {
        bersuara(currentNumber, currentLoket);
      }
    }

    function bersuara(nomor, loket) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const teks = `Nomor antrean ${nomor}, silakan menuju loket ${loket}`;
        const utterance = new SpeechSynthesisUtterance(teks);
        utterance.lang = 'id-ID';
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
      }
    }
  </script>
</body>
</html>
