<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Antrean Loket</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    h2 {
      color: #333;
      margin-bottom: 20px;
    }

    .display-box {
      background: #e8f5e9;
      border: 2px solid #66bb6a;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .nomor-antrean {
      font-size: 48px;
      font-weight: bold;
      color: #2e7d32;
    }

    .label-loket {
      font-size: 18px;
      color: #555;
      margin-top: 5px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 45%;
    }

    button {
      background-color: #2e7d32;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #1b5e20;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Panggilan Antrean</h2>

    <!-- Tampilan Layar Antrean -->
    <div class="display-box">
      <div id="displayNomor" class="nomor-antrean">000</div>
      <div id="displayLoket" class="label-loket">Loket -</div>
    </div>

    <!-- Form Input Panggilan -->
    <div class="input-group">
      <input type="number" id="inputNomor" placeholder="No. Antrean" value="15" min="1">
      <select id="selectLoket">
        <option value="1">Loket 1</option>
        <option value="2" selected>Loket 2</option>
        <option value="3">Loket 3</option>
        <option value="4">Loket 4</option>
      </select>
    </div>

    <!-- Tombol Panggil (HANYA MEMANGGIL SATU FUNGSI) -->
    <button onclick="panggilAntrean()">Panggil Antrean</button>
  </div>

  <script>
    // Variable global untuk menyimpan instance audio yang sedang berjalan
    let currentAudio = null;

    // 1. Fungsi Pemutar Audio Google
    function bersuara(nomor, loket) {
      // Hentikan audio sebelumnya jika masih berbunyi (mencegah suara kedobel/bertumpuk)
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }

      // Susun kalimat panggilan
      const teks = `Nomor antrean ${nomor}, silakan menuju loket ${loket}`;
      
      // End-point Google TTS (Bahasa Indonesia)
      const googleAudioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(teks)}&tl=id&client=tw-ob`;

      // Buat elemen audio baru
      currentAudio = new Audio(googleAudioUrl);
      
      // Putar Audio
      currentAudio.play().catch(error => {
        console.warn("Audio diblokir browser, ketuk layar 1x terlebih dahulu:", error);
      });
    }

    // 2. Fungsi Utama saat Tombol Diklik
    function panggilAntrean() {
      const nomor = document.getElementById('inputNomor').value;
      const loket = document.getElementById('selectLoket').value;

      if (!nomor) {
        alert("Masukkan nomor antrean terlebih dahulu!");
        return;
      }

      // Update Tampilan Layar
      document.getElementById('displayNomor').innerText = nomor;
      document.getElementById('displayLoket').innerText = `Loket ${loket}`;

      // Jalankan Suara
      bersuara(nomor, loket);
    }
  </script>

</body>
</html>
